<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Zach Vollmer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">

</head>

<body>

    <main>

    <!-- HERO -->
    <section class="hero snap-section" id="snap-section-1">

        <div class="container">

            <h1 class="hero__title">Zach Vollmer</h1>

            <p class="hero__description">
                Aspiring creative, digital designer, and problem solver.
                Working on passion projects and learning new ways to express creativity through digital assets.
            </p>

            <button type="button" class="hero__scroll">
                ↓ Selected Work
            </button>

        </div>

    </section>

    <!-- PROJECTS -->
    <section class="projects snap-section" id="snap-section-2">

        <div class="container">

            <article class="project-card">

                <div class="project-card__image">
                    <img
                        src="projects/wesound/images/wesound dark.png"
                        alt="WeSound showcase image">
                </div>

                <h2 class="project-card__title">
                    WeSound
                </h2>

                <p class="project-card__description">
                    An all-in-one sound editing tool for Wii modding.
                </p>

                <div class="project-card__chips">
                    <div class="project-chip">C#</div>
                    <div class="project-chip">WinForms</div>
                    <div class="project-chip">Filesystems</div>
                </div>

                <a
                    class="project-card__button"
                    href="projects/wesound/index.html">

                    Learn more about WeSound →

                </a>

            </article>

        </div>

    </section>

</main>

<script src="assets/js/snap.js"></script>

</body>
